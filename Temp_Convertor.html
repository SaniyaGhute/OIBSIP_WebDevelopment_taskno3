<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00c6ff);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 380px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      text-align: center;
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-8px);
    }

    h2 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 15px;
    }

    input, select {
      background: rgba(255,255,255,0.18);
      color: white;
      outline: none;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(0,198,255,0.6);
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #00f7ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🌡 Smart Temp Converter</h2>
    <p>Modern, sleek, and internship-ready</p>

    <input type="number" id="temp" placeholder="Enter temperature">

    <select id="unit">
      <option value="c">Celsius to Fahrenheit</option>
      <option value="f">Fahrenheit to Celsius</option>
    </select>

    <button onclick="convertTemp()">Convert</button>
    <div id="result"></div>
  </div>

  <script>
    function convertTemp() {
      const temp = parseFloat(document.getElementById('temp').value);
      const unit = document.getElementById('unit').value;
      const result = document.getElementById('result');

      if (isNaN(temp)) {
        result.innerHTML = '⚠ Please enter a valid number';
        return;
      }

      let converted;
      if (unit === 'c') {
        converted = (temp * 9/5) + 32;
        result.innerHTML = `${converted.toFixed(2)} °F`;
      } else {
        converted = (temp - 32) * 5/9;
        result.innerHTML = `${converted.toFixed(2)} °C`;
      }
    }
  </script>
</body>
</html>
